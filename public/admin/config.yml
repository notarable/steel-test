local_backend: true

backend:
  # Для деплоя (например Netlify) обычно используется git-gateway.
  # Для локальной разработки используйте: npx decap-server
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Сайт: настройки/тексты"
    format: "json"
    files:
      - name: "site"
        label: "Основные данные"
        file: "src/data/site.json"
        fields:
          - label: "Компания"
            name: "company"
            widget: "object"
            fields:
              - { label: "Название", name: "name", widget: "string" }
              - { label: "Подзаголовок (tagline)", name: "tagline", widget: "string" }
              - { label: "Описание (about)", name: "about", widget: "text" }
          - label: "Контакты"
            name: "contacts"
            widget: "object"
            fields:
              - { label: "Телефон", name: "phone", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Адрес", name: "address", widget: "string" }

  - name: "documents"
    label: "Документы / PDF"
    format: "json"
    files:
      - name: "documents"
        label: "Список документов"
        file: "src/data/documents.json"
        fields:
          - label: "Документы"
            name: "documents"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Категория", name: "category", widget: "select", options: ["Сертификаты", "Узлы крепления", "Конструктивные схемы"] }
              - { label: "Название", name: "title", widget: "string" }
              - { label: "Описание", name: "description", widget: "text", required: false }
              - { label: "Файл (PDF)", name: "file", widget: "file", required: false, media_folder: "public/uploads/docs", public_folder: "/uploads/docs" }
              - { label: "Дата обновления", name: "updatedAt", widget: "string", required: false }

  - name: "projects"
    label: "Объекты"
    format: "json"
    files:
      - name: "projects"
        label: "Список объектов"
        file: "src/data/projects.json"
        fields:
          - label: "Объекты"
            name: "projects"
            widget: "list"
            fields:
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Название", name: "title", widget: "string" }
              - { label: "Год", name: "year", widget: "number" }
              - { label: "Город/регион", name: "city", widget: "string" }
              - { label: "Тип здания", name: "buildingType", widget: "string" }
              - { label: "Система", name: "system", widget: "string" }
              - { label: "Кратко", name: "summary", widget: "text" }
              - label: "Изображения"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Файл", name: "image", widget: "image", media_folder: "public/uploads/projects", public_folder: "/uploads/projects" }

